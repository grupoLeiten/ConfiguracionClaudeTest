<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Leiten SA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: arial, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 20px;
            gap: 15px;
            font-size: 13px;
        }
        header a {
            color: #000;
            text-decoration: none;
        }
        header a:hover {
            text-decoration: underline;
        }
        .apps-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }
        .apps-icon:hover {
            background: #f1f3f4;
        }
        .profile {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1a73e8;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -80px;
            padding: 0 20px;
        }
        .logo {
            font-size: 90px;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }
        .logo .c1 { color: #4285F4; }
        .logo .c2 { color: #EA4335; }
        .logo .c3 { color: #FBBC05; }
        .logo .c4 { color: #4285F4; }
        .logo .c5 { color: #34A853; }
        .logo .c6 { color: #EA4335; }
        .search-box {
            width: 100%;
            max-width: 584px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: box-shadow 0.2s;
        }
        .search-box:hover,
        .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        .search-box svg {
            flex-shrink: 0;
        }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 6px 0;
            background: transparent;
        }
        .buttons {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .buttons button {
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-family: arial, sans-serif;
            font-size: 14px;
            padding: 0 16px;
            height: 36px;
            cursor: pointer;
        }
        .buttons button:hover {
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            border: 1px solid #dadce0;
            color: #202124;
        }
        .languages {
            margin-top: 20px;
            font-size: 13px;
            color: #3c4043;
        }
        .languages a {
            color: #1a0dab;
            text-decoration: none;
            margin: 0 4px;
        }
        .languages a:hover {
            text-decoration: underline;
        }
        footer {
            background: #f2f2f2;
            color: #70757a;
            font-size: 14px;
        }
        .footer-top {
            padding: 15px 30px;
            border-bottom: 1px solid #dadce0;
        }
        .footer-bottom {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .footer-bottom .links {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        footer a {
            color: #70757a;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <a href="#">Gmail</a>
        <a href="#">Imágenes</a>
        <svg class="apps-icon" focusable="false" viewBox="0 0 24 24"><path d="M6,8c1.1,0,2-0.9,2-2S7.1,4,6,4S4,4.9,4,6S4.9,8,6,8z M12,20c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S10.9,20,12,20z M6,20c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S4.9,20,6,20z M6,14c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S4.9,14,6,14z M12,14c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S10.9,14,12,14z M16,6c0,1.1,0.9,2,2,2s2-0.9,2-2s-0.9-2-2-2S16,4.9,16,6z M12,8c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S10.9,8,12,8z M18,14c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S16.9,14,18,14z M18,20c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S16.9,20,18,20z"/></svg>
        <div class="profile">M</div>
    </header>

    <main>
        <div class="logo">
            <span class="c1">L</span><span class="c2">e</span><span class="c3">i</span><span class="c4">t</span><span class="c5">e</span><span class="c6">n</span>&nbsp;<span class="c1">S</span><span class="c2">A</span>
        </div>

        <form class="search-box" action="https://www.google.com/search" method="GET">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#9aa0a6">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" name="q" autofocus autocomplete="off">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 192 192">
                <rect fill="none" height="192" width="192"/>
                <g>
                    <path d="M96,120c13.25,0,24-10.74,24-24V48c0-13.25-10.75-24-24-24S72,34.75,72,48v48C72,109.26,82.75,120,96,120z" fill="#4285f4"/>
                    <path d="M40,96c0,30.88,23.36,56.32,53.33,59.64V168h-21.6c-3.17,0-5.73,2.56-5.73,5.73v4.54c0,3.17,2.56,5.73,5.73,5.73 h48.53c3.17,0,5.73-2.56,5.73-5.73v-4.54c0-3.17-2.56-5.73-5.73-5.73h-21.6v-12.36C128.64,152.32,152,126.88,152,96v-8 c0-4.42-3.58-8-8-8s-8,3.58-8,8v8c0,22.06-17.94,40-40,40c-22.06,0-40-17.94-40-40v-8c0-4.42-3.58-8-8-8s-8,3.58-8,8V96z" fill="#34a853"/>
                </g>
            </svg>
        </form>

        <div class="buttons">
            <button type="button">Buscar con Leiten SA</button>
            <button type="button">Voy a tener suerte</button>
        </div>

        <div class="languages">
            Leiten SA ofrecido en:
            <a href="#">English</a>
            <a href="#">Português</a>
            <a href="#">Français</a>
            <a href="#">Italiano</a>
        </div>
    </main>

    <footer>
        <div class="footer-top">Argentina</div>
        <div class="footer-bottom">
            <div class="links">
                <a href="#">Publicidad</a>
                <a href="#">Negocios</a>
                <a href="#">Cómo funciona la Búsqueda</a>
            </div>
            <div class="links">
                <a href="#">Privacidad</a>
                <a href="#">Condiciones</a>
                <a href="#">Preferencias</a>
            </div>
        </div>
    </footer>
</body>
</html>
